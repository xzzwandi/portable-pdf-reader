<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f3eb" />
    <title>随身阅读</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=55" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">读</span>
          <div>
            <div class="brand-title">
              <h1>随身阅读</h1>
              <span id="appVersion" class="version-badge">v55</span>
            </div>
            <p id="docName">未打开文件</p>
          </div>
        </div>

        <div class="actions">
          <input id="fileInput" type="file" accept="application/pdf,.pdf,application/epub+zip,.epub" hidden />
          <button id="lockButton" type="button">锁</button>
          <button id="libraryButton" type="button">书架</button>
          <button id="openButton" class="primary" type="button">打开文件</button>
        </div>
      </header>

      <main class="reader">
        <section id="emptyState" class="empty-state">
          <div class="empty-mark" aria-hidden="true">书</div>
          <h2>选择一个文件开始</h2>
          <p>PDF 和 EPUB 都会保存在这台设备的浏览器里。</p>
          <button id="emptyOpenButton" class="primary large" type="button">打开文件</button>
        </section>

        <section id="viewerPane" class="viewer-pane" hidden>
          <div class="canvas-wrap" id="canvasWrap">
            <canvas id="pdfCanvas"></canvas>
            <div id="continuousPages" class="continuous-pages" hidden></div>
          </div>
          <div id="epubPane" class="epub-pane" hidden>
            <div id="epubViewer" class="epub-viewer"></div>
          </div>
        </section>
      </main>

      <footer id="controls" class="controls" hidden>
        <button id="prevButton" type="button" aria-label="上一页">上一页</button>
        <label class="page-jump" for="pageInput">
          <input id="pageInput" type="number" min="1" value="1" inputmode="numeric" />
          <span id="pageTotal">/ 0</span>
        </label>
        <button id="nextButton" type="button" aria-label="下一页">下一页</button>

        <div class="spacer"></div>

        <div class="mode-switch" role="group" aria-label="阅读模式">
          <button id="pagedModeButton" type="button" aria-pressed="true">分页</button>
          <button id="scrollModeButton" type="button" aria-pressed="false">连续</button>
        </div>

        <div id="edgeJumpGroup" class="edge-jumps" role="group" aria-label="连续模式跳转" hidden>
          <button id="jumpTopButton" type="button" aria-label="跳到顶部">↑</button>
          <button id="jumpBottomButton" type="button" aria-label="跳到底部">↓</button>
        </div>

        <button id="zoomOutButton" type="button" aria-label="缩小">-</button>
        <button id="fitButton" type="button">适宽</button>
        <button id="fullscreenButton" type="button" aria-pressed="false">全屏</button>
        <button id="zoomInButton" type="button" aria-label="放大">+</button>
      </footer>

      <button id="floatingLockButton" class="floating-lock" type="button" aria-label="锁定阅读器">
        锁
      </button>
      <button id="floatingFullscreenButton" class="floating-fullscreen" type="button" aria-label="退出全屏" aria-pressed="true" hidden>
        退
      </button>
      <button id="tocButton" class="floating-toc" type="button" aria-label="打开章节目录" hidden>
        目录
      </button>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div id="imageOverlay" class="image-overlay" hidden>
        <button id="imageCloseButton" class="image-close" type="button" aria-label="关闭图片">×</button>
        <img id="imagePreview" class="image-preview" alt="" />
      </div>

      <div id="libraryOverlay" class="library-overlay" hidden>
        <section class="library-panel" role="dialog" aria-modal="true" aria-labelledby="libraryTitle">
          <header class="library-header">
            <h2 id="libraryTitle">书架</h2>
            <button id="libraryCloseButton" type="button" aria-label="关闭书架">关闭</button>
          </header>

          <div id="libraryList" class="library-list"></div>
          <p id="libraryEmptyState" class="library-empty">还没有保存过 PDF。</p>
        </section>
      </div>

      <div id="encryptionOverlay" class="encryption-overlay" hidden>
        <section class="encryption-panel" role="dialog" aria-modal="true" aria-labelledby="encryptionTitle">
          <div class="lock-mark" aria-hidden="true">密</div>
          <h2 id="encryptionTitle">需要加密书架文件</h2>
          <p id="encryptionDescription">已开启密码锁，书架里还有文件尚未加密。</p>

          <form id="encryptionForm" class="encryption-form">
            <input
              id="encryptionPasswordInput"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              data-password-mask="true"
              inputmode="text"
              minlength="4"
              placeholder="输入密码"
              spellcheck="false"
              hidden
            />
            <progress id="encryptionProgress" max="100" value="0" hidden></progress>
            <p id="encryptionProgressText" class="encryption-progress-text" hidden></p>
            <button id="encryptionStartButton" class="primary" type="submit">加密文件</button>
          </form>

          <button id="encryptionLaterButton" type="button">稍后</button>
        </section>
      </div>

      <div id="tocOverlay" class="toc-overlay" hidden>
        <section class="toc-panel" role="dialog" aria-modal="true" aria-labelledby="tocTitle">
          <header class="toc-header">
            <h2 id="tocTitle">章节目录</h2>
            <button id="tocCloseButton" type="button" aria-label="关闭章节目录">关闭</button>
          </header>

          <div id="tocList" class="toc-list"></div>
          <p id="tocEmptyState" class="toc-empty">这本书没有可用目录。</p>
        </section>
      </div>

      <div id="lockOverlay" class="lock-overlay" hidden>
        <section class="lock-panel" role="dialog" aria-modal="true" aria-labelledby="lockTitle">
          <div class="lock-mark" aria-hidden="true">PDF</div>
          <h2 id="lockTitle">密码锁</h2>
          <p id="lockDescription">输入密码后继续阅读。</p>

          <form id="lockForm" class="lock-form">
            <input
              id="lockPasswordInput"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              data-password-mask="true"
              inputmode="text"
              minlength="4"
              placeholder="输入密码"
              spellcheck="false"
            />
            <input
              id="lockConfirmInput"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              data-password-mask="true"
              inputmode="text"
              minlength="4"
              placeholder="再次输入密码"
              spellcheck="false"
              hidden
            />
            <button id="lockSubmitButton" class="primary" type="submit">解锁</button>
          </form>

          <button id="lockCancelButton" type="button" hidden>取消</button>
        </section>
      </div>
    </div>

    <script src="./vendor/jszip/jszip.min.js?v=45"></script>
    <script src="./vendor/epubjs/epub.min.js?v=45"></script>
    <script type="module" src="./app.js?v=55"></script>
  </body>
</html>
